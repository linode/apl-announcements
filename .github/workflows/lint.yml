name: Lint

on:
  push:
    paths:
      - '*'
    branches:
      - main
  pull_request:
    paths:
      - '*'
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install packages
        run: npm ci
      - name: Lint
        run: npm run lint
